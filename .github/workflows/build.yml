name: Build macOS arm64 App

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos-arm64:
    name: Build macOS arm64
    runs-on: macos-latest

    env:
      PACKAGE_NAME: ArtifexDisplayConverter-macOS-arm64
      PYINSTALLER_TARGET_ARCH: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Print build environment
        shell: bash
        run: |
          echo "RUNNER_OS=$RUNNER_OS"
          echo "PACKAGE_NAME=$PACKAGE_NAME"
          echo "PYINSTALLER_TARGET_ARCH=$PYINSTALLER_TARGET_ARCH"

          python - <<'PY'
          import sys
          import platform
          import struct

          print("python:", sys.version)
          print("executable:", sys.executable)
          print("system:", platform.system())
          print("machine:", platform.machine())
          print("processor:", platform.processor())
          print("bits:", struct.calcsize("P") * 8)
          PY

          echo "uname -m:"
          uname -m

          echo "sw_vers:"
          sw_vers

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate dependency imports
        shell: bash
        run: |
          python - <<'PY'
          import platform

          print("system:", platform.system())
          print("machine:", platform.machine())

          import PIL
          print("Pillow OK")

          import imageio_ffmpeg
          print("FFmpeg from imageio:", imageio_ffmpeg.get_ffmpeg_exe())

          import PyInstaller
          print("PyInstaller OK")

          import tkinter
          print("tkinter OK")

          try:
              import tkinterdnd2
              print("tkinterdnd2 OK")
          except Exception as e:
              print("tkinterdnd2 import failed:", e)
              raise
          PY

      - name: Build with PyInstaller
        shell: bash
        run: |
          python build.py

      - name: Show dist files
        shell: bash
        run: |
          echo "=== dist tree ==="
          find dist -maxdepth 5 -print || true

          echo "=== app executable file info ==="
          file "dist/ArtifexDisplayConverter.app/Contents/MacOS/ArtifexDisplayConverter"

          echo "=== app executable permission ==="
          ls -l "dist/ArtifexDisplayConverter.app/Contents/MacOS/"

      - name: Smoke test packaged app
        shell: bash
        run: |
          BIN="dist/ArtifexDisplayConverter.app/Contents/MacOS/ArtifexDisplayConverter"

          echo "BIN=$BIN"

          echo "=== file info ==="
          file "$BIN"

          echo "=== self test ==="
          "$BIN" --self-test

          echo "=== gui smoke test ==="
          "$BIN" --gui-smoke-test

      - name: Package app
        shell: bash
        run: |
          python package_release.py

      - name: Test final zip after extraction
        shell: bash
        run: |
          rm -rf extracted
          mkdir extracted

          ZIP="release/${PACKAGE_NAME}.zip"
          echo "Testing zip: $ZIP"

          ditto -x -k "$ZIP" extracted

          echo "=== extracted tree ==="
          find extracted -maxdepth 5 -print || true

          BIN="extracted/ArtifexDisplayConverter.app/Contents/MacOS/ArtifexDisplayConverter"

          echo "BIN=$BIN"

          chmod +x "$BIN"

          echo "=== file info ==="
          file "$BIN"

          echo "=== permission ==="
          ls -l "$(dirname "$BIN")"

          echo "=== self test after extraction ==="
          "$BIN" --self-test

          echo "=== gui smoke test after extraction ==="
          "$BIN" --gui-smoke-test

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ArtifexDisplayConverter-macOS-arm64
          path: release/*.zip

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.zip
