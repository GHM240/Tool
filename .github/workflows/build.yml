name: Build Desktop Apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            package_name: ArtifexDisplayConverter-Windows
          - name: macOS
            os: macos-latest
            package_name: ArtifexDisplayConverter-macOS
          - name: Linux
            os: ubuntu-latest
            package_name: ArtifexDisplayConverter-Linux

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux GUI build packages
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk tk-dev xvfb

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate dependency imports
        shell: bash
        run: |
          python -c "import PIL; import imageio_ffmpeg; print('Pillow OK'); print('FFmpeg:', imageio_ffmpeg.get_ffmpeg_exe())"
          python Tool.py --self-test

      - name: Build with PyInstaller
        shell: bash
        run: |
          python build.py

      - name: Smoke test packaged app
        shell: bash
        run: |
          echo "=== dist structure ==="
          find dist -maxdepth 5 -print

          if [ "$RUNNER_OS" = "Windows" ]; then
            ./dist/ArtifexDisplayConverter.exe --self-test
          elif [ "$RUNNER_OS" = "macOS" ]; then
            APP="dist/ArtifexDisplayConverter.app"
            BIN="$APP/Contents/MacOS/ArtifexDisplayConverter"
            echo "=== macOS executable permissions ==="
            ls -l "$BIN"
            chmod +x "$BIN"
            "$BIN" --self-test
            echo "=== Gatekeeper assessment, unsigned app may be rejected ==="
            spctl --assess --type execute -vv "$APP" || true
          else
            chmod +x ./dist/ArtifexDisplayConverter
            xvfb-run -a ./dist/ArtifexDisplayConverter --self-test
          fi

      - name: Package app
        shell: bash
        run: |
          python package_release.py "${{ matrix.package_name }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package_name }}
          path: release/${{ matrix.package_name }}.zip

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/${{ matrix.package_name }}.zip
