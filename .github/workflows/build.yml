name: Build Desktop Apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
          - os: macos-latest
            label: macOS
          - os: ubuntu-latest
            label: Linux

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Linux 上 PyInstaller / Tkinter GUI 打包有时需要系统 GUI 相关包。
      - name: Install Linux GUI build packages
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk tk-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate dependency imports
        run: |
          python - <<'PY'
          import PIL
          import imageio_ffmpeg
          print('Pillow OK')
          print('imageio-ffmpeg OK')
          try:
              import tkinterdnd2
              print('tkinterdnd2 OK')
          except Exception as e:
              print('tkinterdnd2 optional import failed:', e)
          print('ffmpeg exe:', imageio_ffmpeg.get_ffmpeg_exe())
          PY

      - name: Build with PyInstaller
        run: |
          python build.py

      # 这个步骤是第一版云端自检的核心：不打开 GUI，只运行 Tool.py 里的 --self-test。
      # 它可以验证：打包产物能启动、Pillow 能导入、FFmpeg 能找到。
      - name: Smoke test packaged app
        shell: bash
        run: |
          echo "=== dist structure ==="
          find dist -maxdepth 6 -print || true

          if [ "$RUNNER_OS" = "Windows" ]; then
            EXE="dist/ArtifexDisplayConverter.exe"
            echo "Testing Windows executable: $EXE"
            "$EXE" --self-test
          elif [ "$RUNNER_OS" = "macOS" ]; then
            APP="dist/ArtifexDisplayConverter.app"
            BIN="$APP/Contents/MacOS/ArtifexDisplayConverter"
            echo "Testing macOS app bundle: $APP"
            echo "Executable permissions before chmod:"
            ls -l "$BIN"
            chmod +x "$BIN"
            echo "Executable permissions after chmod:"
            ls -l "$BIN"
            echo "=== Run self-test ==="
            "$BIN" --self-test
            echo "=== Gatekeeper assessment, unsigned app may be rejected. This is expected before signing/notarization. ==="
            spctl --assess --type execute -vv "$APP" || true
          else
            BIN="dist/ArtifexDisplayConverter"
            echo "Testing Linux executable: $BIN"
            chmod +x "$BIN"
            "$BIN" --self-test
          fi

      - name: Package app
        run: |
          python package_release.py ArtifexDisplayConverter-${{ matrix.label }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ArtifexDisplayConverter-${{ matrix.label }}
          path: release/ArtifexDisplayConverter-${{ matrix.label }}.zip
          if-no-files-found: error

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/ArtifexDisplayConverter-${{ matrix.label }}.zip
