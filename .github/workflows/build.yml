name: Build Windows and macOS Apps

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            package_name: ArtifexDisplayConverter-Windows
            pyinstaller_arch: ""

          - name: macOS-arm64
            os: macos-latest
            package_name: ArtifexDisplayConverter-macOS-arm64
            pyinstaller_arch: arm64

    env:
      PACKAGE_NAME: ${{ matrix.package_name }}
      PYINSTALLER_TARGET_ARCH: ${{ matrix.pyinstaller_arch }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Print build environment
        shell: bash
        run: |
          echo "RUNNER_OS=$RUNNER_OS"
          echo "PACKAGE_NAME=$PACKAGE_NAME"
          echo "PYINSTALLER_TARGET_ARCH=$PYINSTALLER_TARGET_ARCH"
          python - <<'PY'
          import sys, platform, struct
          print("python:", sys.version)
          print("executable:", sys.executable)
          print("system:", platform.system())
          print("machine:", platform.machine())
          print("processor:", platform.processor())
          print("bits:", struct.calcsize("P") * 8)
          PY

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate dependency imports
        shell: bash
        run: |
          python - <<'PY'
          import platform
          print("system:", platform.system())
          print("machine:", platform.machine())

          import PIL
          print("Pillow OK")

          import imageio_ffmpeg
          print("FFmpeg from imageio:", imageio_ffmpeg.get_ffmpeg_exe())

          import PyInstaller
          print("PyInstaller OK")

          import tkinter
          print("tkinter OK")

          if platform.system() == "Darwin":
              print("tkinterdnd2 skipped on macOS")
          else:
              import tkinterdnd2
              print("tkinterdnd2 OK")
          PY

      - name: Build with PyInstaller
        shell: bash
        run: |
          python build.py

      - name: Show dist files
        shell: bash
        run: |
          echo "=== dist tree ==="
          find dist -maxdepth 8 -print || true

          if [[ "$RUNNER_OS" == "Windows" ]]; then
            echo "=== Windows dist folder ==="
            ls -la "dist/ArtifexDisplayConverter" || true
          fi

          if [[ "$RUNNER_OS" == "macOS" ]]; then
            echo "=== macOS app executable info ==="
            file "dist/ArtifexDisplayConverter.app/Contents/MacOS/ArtifexDisplayConverter" || true

            echo "=== macOS bundled ffmpeg info ==="
            ls -la "dist/ArtifexDisplayConverter.app/Contents/Resources/" || true
            file "dist/ArtifexDisplayConverter.app/Contents/Resources/ffmpeg" || true
          fi

      - name: Smoke test packaged app
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            BIN="dist/ArtifexDisplayConverter/ArtifexDisplayConverter.exe"
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            BIN="dist/ArtifexDisplayConverter.app/Contents/MacOS/ArtifexDisplayConverter"
          else
            BIN="dist/ArtifexDisplayConverter/ArtifexDisplayConverter"
          fi

          echo "BIN=$BIN"

          if [[ ! -f "$BIN" ]]; then
            echo "ERROR: packaged app not found: $BIN"
            echo "=== dist tree for debug ==="
            find dist -maxdepth 8 -print || true
            exit 1
          fi

          if [[ "$RUNNER_OS" != "Windows" ]]; then
            chmod +x "$BIN"
          fi

          echo "=== self test ==="
          "$BIN" --self-test

          echo "=== tk smoke test ==="
          "$BIN" --tk-smoke-test

          echo "=== gui smoke test ==="
          "$BIN" --gui-smoke-test

      - name: Package app
        shell: bash
        run: |
          python package_release.py

      - name: Test final zip after extraction
        shell: bash
        run: |
          rm -rf extracted
          mkdir extracted

          ZIP="release/${PACKAGE_NAME}.zip"
          echo "Testing zip: $ZIP"

          if [[ ! -f "$ZIP" ]]; then
            echo "ERROR: zip not found: $ZIP"
            echo "=== release tree ==="
            find release -maxdepth 4 -print || true
            exit 1
          fi

          if [[ "$RUNNER_OS" == "macOS" ]]; then
            ditto -x -k "$ZIP" extracted
          else
            python - <<PY
          import zipfile
          zip_path = r"$ZIP"
          with zipfile.ZipFile(zip_path, "r") as zf:
              zf.extractall("extracted")
          PY
          fi

          echo "=== extracted tree ==="
          find extracted -maxdepth 8 -print || true

          if [[ "$RUNNER_OS" == "Windows" ]]; then
            BIN="extracted/ArtifexDisplayConverter/ArtifexDisplayConverter.exe"
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            BIN="extracted/ArtifexDisplayConverter.app/Contents/MacOS/ArtifexDisplayConverter"
          else
            BIN="extracted/ArtifexDisplayConverter/ArtifexDisplayConverter"
          fi

          echo "BIN=$BIN"

          if [[ ! -f "$BIN" ]]; then
            echo "ERROR: extracted app not found: $BIN"
            echo "=== extracted tree for debug ==="
            find extracted -maxdepth 8 -print || true
            exit 1
          fi

          if [[ "$RUNNER_OS" != "Windows" ]]; then
            chmod +x "$BIN"
          fi

          if [[ "$RUNNER_OS" == "macOS" ]]; then
            echo "=== extracted macOS Resources ==="
            ls -la "extracted/ArtifexDisplayConverter.app/Contents/Resources/" || true
            file "extracted/ArtifexDisplayConverter.app/Contents/Resources/ffmpeg" || true
          fi

          echo "=== self test after extraction ==="
          "$BIN" --self-test

          echo "=== tk smoke test after extraction ==="
          "$BIN" --tk-smoke-test

          echo "=== gui smoke test after extraction ==="
          "$BIN" --gui-smoke-test

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package_name }}
          path: release/*.zip

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.zip